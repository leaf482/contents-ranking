networks:
  contents-ranking-net:
    driver: bridge

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:latest
    container_name: kafka-kraft
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    networks:
      - contents-ranking-net
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - contents-ranking-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Exporters ───────────────────────────────────────────────────────────────

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:9092"
    networks:
      - contents-ranking-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - contents-ranking-net
    depends_on:
      redis:
        condition: service_healthy

  # ── Application Workers ──────────────────────────────────────────

  go-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: video-heartbeats
      REDIS_ADDR: redis:6379
      SERVER_PORT: "8081"
      BATCH_SIZE: "50"
      BATCH_FLUSH_INTERVAL: "100ms"
    networks:
      - contents-ranking-net
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No host port binding — metrics (8081) internal only for Prometheus

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - contents-ranking-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"   # 3000 is taken by simulation-service
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./simulation-service/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./simulation-service/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./simulation-service/grafana/dashboards:/var/lib/grafana-dashboards:ro
    networks:
      - contents-ranking-net
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-data:
