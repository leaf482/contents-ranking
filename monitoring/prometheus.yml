global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Go API & Worker, Simulation: run on host (not in Docker) → use host.docker.internal
  - job_name: go-api
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: go-worker
    static_configs:
      # Docker-scaled workers (no host port binding)
      - targets:
          - contents-ranking-go-worker-1:8081
          - contents-ranking-go-worker-2:8081
          - contents-ranking-go-worker-3:8081

  - job_name: simulation-service
    static_configs:
      - targets: ['host.docker.internal:3000']

  # Exporters: run in Docker on same network
  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
